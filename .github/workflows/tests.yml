name: tests

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    # telemed's .tvd extract path is COM-based (EchoWave AutoInt1 via
    # pywin32), so Windows is the only platform where the full pipeline
    # runs. The encode + analyze paths are platform-independent but
    # aren't useful without the Windows-only acquisition device, so CI
    # is Windows-only.
    name: pytest (Python ${{ matrix.python-version }} on windows)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest
